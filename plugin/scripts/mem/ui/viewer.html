<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fireauto 지식 DB</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-primary:#fff;--bg-secondary:#f5f5f7;--bg-card:#fff;--bg-hover:#f9fafb;--text-primary:#1a1a2e;--text-secondary:#6b7280;--text-tertiary:#9ca3af;--border:#e5e7eb;--border-light:#f3f4f6;--accent:#f97316;--accent-light:#fff7ed;--accent-dim:rgba(249,115,22,.1);--success:#22c55e;--error:#ef4444;--info:#3b82f6;--shadow:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:12px;--radius-sm:8px;--radius-xs:4px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;color-scheme:light dark}
[data-theme="dark"]{--bg-primary:#0d1117;--bg-secondary:#161b22;--bg-card:#1c2333;--bg-hover:#1c2128;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-tertiary:#6e7681;--border:#30363d;--border-light:#21262d;--accent:#fb923c;--accent-light:#1c1917;--accent-dim:rgba(251,146,60,.12);--shadow:0 2px 8px rgba(0,0,0,.4);--shadow-md:0 4px 16px rgba(0,0,0,.35);--shadow-lg:0 8px 30px rgba(0,0,0,.45)}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh;transition:background .25s,color .25s}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:background .25s,border-color .25s;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.header-logo{font-size:1.1rem;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:6px}
.header-logo .fire{color:var(--accent)}
.header-tabs{display:flex;gap:2px;background:var(--bg-secondary);border-radius:var(--radius-sm);padding:2px}
.header-tabs .tab-btn{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--text-secondary);font-size:.8125rem;cursor:pointer;font-weight:500;transition:all .2s;font-family:var(--font)}
.header-tabs .tab-btn.active{background:var(--bg-card);color:var(--text-primary);box-shadow:var(--shadow)}
.header-tabs .tab-btn:hover:not(.active){color:var(--text-primary)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.search-box{border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:.875rem;background:var(--bg-secondary);color:var(--text-primary);width:200px;outline:none;transition:border-color .2s,width .2s,box-shadow .2s;font-family:var(--font)}
.search-box:focus{border-color:var(--accent);width:260px;box-shadow:0 0 0 3px var(--accent-dim)}
.filter-select{border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;font-size:.875rem;background:var(--bg-secondary);color:var(--text-primary);outline:none;cursor:pointer;font-family:var(--font)}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-secondary);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s}
.icon-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.stats-bar{padding:8px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;font-size:.8125rem;color:var(--text-secondary);transition:background .25s,border-color .25s;flex-wrap:wrap}
.stats-bar .stat{display:flex;align-items:center;gap:4px}
.stats-bar .stat strong{color:var(--text-primary);font-weight:600}
.connection-dot{width:8px;height:8px;border-radius:50%;display:inline-block;transition:background .3s}
.connection-dot.connected{background:var(--success)}
.connection-dot.disconnected{background:var(--error);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{max-width:760px;margin:0 auto;padding:20px 16px 80px}
.tab-content{display:none}
.tab-content.active{display:block}
.feed{display:flex;flex-direction:column;gap:0}
.date-divider{display:flex;align-items:center;gap:12px;padding:16px 0 8px;font-size:.8125rem;color:var(--text-tertiary);font-weight:500}
.date-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid var(--card-accent,var(--border));transition:all .2s;box-shadow:var(--shadow);animation:cardIn .25s ease-out}
.card:hover{box-shadow:var(--shadow-md)}
.card.highlight{animation:highlightPulse 1.5s ease}
@keyframes highlightPulse{
  0%,100%{box-shadow:none}
  50%{box-shadow:0 0 0 3px var(--accent)}
}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.card-header-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.card-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.type-badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.project-label{font-size:.75rem;color:var(--text-tertiary);font-weight:500;white-space:nowrap}
.toggle-group{display:flex;gap:4px}
.toggle-btn{font-size:.6875rem;padding:2px 8px;border-radius:var(--radius-xs);border:1px solid var(--border);background:transparent;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);transition:all .15s;font-weight:500}
.toggle-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.toggle-btn:hover:not(.active){color:var(--text-secondary);border-color:var(--text-secondary)}
.card-title{font-size:.9375rem;font-weight:600;line-height:1.4;margin-bottom:2px}
.card-subtitle{font-size:.8125rem;color:var(--text-secondary);line-height:1.5;margin-bottom:4px}
.card-content{font-size:.8125rem;color:var(--text-secondary);line-height:1.7;margin-top:2px}
.facts-section{margin-top:10px;display:none;padding:10px 12px;background:var(--bg-secondary);border-radius:var(--radius-sm)}
.facts-section.open{display:block}
.fact-item{font-size:.8125rem;color:var(--text-secondary);padding:3px 0;display:flex;align-items:flex-start;gap:6px}
.fact-item::before{content:'\2022';color:var(--accent);font-weight:700;flex-shrink:0}
.narrative-section{margin-top:10px;display:none;padding:10px 12px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:.8125rem;color:var(--text-secondary);line-height:1.7}
.narrative-section.open{display:block}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;font-size:.75rem}
.file-tag{color:var(--text-secondary);background:var(--bg-secondary);padding:2px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.tag{color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:4px}
.backlinks{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
.backlinks-title{font-size:11px;color:var(--text-tertiary);margin-bottom:6px;font-weight:500}
.backlink{display:inline-block;padding:2px 8px;margin:2px 4px 2px 0;background:var(--accent-dim);color:var(--accent);border-radius:4px;font-size:12px;cursor:pointer;text-decoration:none;border:none;font-family:var(--font);transition:background .15s}
.backlink:hover{text-decoration:underline;background:var(--accent-light)}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:.6875rem;color:var(--text-tertiary)}
.card-footer .card-id{font-weight:600}
.summary-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;max-height:200px;overflow:hidden;position:relative;cursor:pointer;transition:max-height .3s ease;border-left:4px solid var(--info);animation:cardIn .25s ease-out}
.summary-card:hover{box-shadow:var(--shadow-md)}
.summary-label{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.summary-fields{display:grid;grid-template-columns:1fr;gap:8px}
.summary-field{padding:6px 0}
.summary-field .sf-label{font-size:11px;color:var(--text-tertiary);font-weight:500;margin-bottom:1px;display:block}
.summary-field .sf-value{font-size:.8125rem;color:var(--text-primary);line-height:1.5}
.summary-footer{margin-top:10px;font-size:.6875rem;color:var(--text-tertiary)}
.empty-project{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-project .ep-icon{font-size:2.5rem;margin-bottom:12px}
.empty-project .ep-title{font-size:1.125rem;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.empty-project .ep-desc{font-size:.875rem}
.project-dashboard{max-width:800px;margin:0 auto}
.project-header{margin-bottom:16px}
.project-name{font-size:1.25rem;font-weight:700;margin-bottom:4px}
.project-meta{display:flex;gap:10px;font-size:.8125rem;color:var(--text-secondary)}
.project-status{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:var(--accent-dim);color:var(--accent)}
.progress-section{margin:16px 0}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.progress-text{font-size:13px;color:var(--text-secondary);margin-top:4px;display:block}
.milestone-list{display:flex;flex-direction:column;gap:0}
.milestone-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid var(--border);box-shadow:var(--shadow)}
.milestone-card.completed{border-left-color:var(--success);opacity:.7}
.milestone-card.in_progress{border-left-color:var(--accent)}
.milestone-card.pending{border-left-color:var(--text-tertiary)}
.milestone-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.milestone-icon{font-size:1rem}
.milestone-title{font-weight:600;font-size:.9375rem;flex:1}
.milestone-progress{font-size:.75rem;color:var(--text-secondary);background:var(--bg-secondary);padding:2px 8px;border-radius:4px}
.milestone-tasks{display:flex;flex-direction:column;gap:0}
.task-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:.8125rem}
.task-item:last-child{border-bottom:none}
.task-item.completed{opacity:.6;text-decoration:line-through}
.task-check{flex-shrink:0}
.task-title{flex:1;min-width:0}
.task-priority{font-size:11px;padding:1px 6px;border-radius:3px;background:var(--accent-dim);color:var(--accent);flex-shrink:0}
.task-memory{width:100%;font-size:12px;color:var(--text-tertiary);padding:4px 0 0 28px}
.search-hl{background:var(--accent-dim);border-radius:2px;padding:0 2px}
#graphView{position:relative}
#graph-canvas{width:100%;height:500px;background:var(--bg-secondary);border-radius:var(--radius);border:1px solid var(--border);cursor:grab;display:block}
#graph-canvas:active{cursor:grabbing}
.fullscreen-btn{position:absolute;top:8px;right:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xs);padding:4px 10px;cursor:pointer;font-size:15px;z-index:5;color:var(--text-primary);transition:border-color .2s}
.fullscreen-btn:hover{border-color:var(--accent)}
#graphView.fullscreen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg-primary);padding:0;margin:0}
#graphView.fullscreen #graph-canvas{height:100vh !important}
.graph-tooltip{position:absolute;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);font-size:.8125rem;pointer-events:none;z-index:10;max-width:260px;display:none}
.graph-tooltip .gt-title{font-weight:600;margin-bottom:2px}
.graph-tooltip .gt-type{font-size:.75rem;color:var(--text-secondary)}
.graph-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:.75rem;color:var(--text-secondary)}
.graph-legend-item{display:flex;align-items:center;gap:4px}
.graph-legend-dot{width:10px;height:10px;border-radius:50%}
.load-more{text-align:center;padding:16px}
.load-more-btn{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 24px;font-size:.875rem;cursor:pointer;transition:background .2s,border-color .2s;font-family:var(--font)}
.load-more-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .es-icon{font-size:2.5rem;margin-bottom:12px}
.empty-state .es-title{font-size:1.125rem;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.empty-state .es-desc{font-size:.875rem}
.loading{text-align:center;padding:40px;color:var(--text-secondary);font-size:.875rem}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .header{padding:10px 12px;gap:8px}
  .search-box{width:140px}
  .search-box:focus{width:180px}
  .main{padding:12px 10px 60px}
  .stats-bar{padding:6px 12px;gap:10px;font-size:.75rem}
  .card{padding:16px}
  .summary-card{padding:14px 16px}
  #graph-canvas{height:350px}
  .header-tabs .tab-btn{padding:4px 10px;font-size:.75rem}
  .card-header{flex-wrap:wrap;gap:6px}
}
@media(max-width:375px){
  .header-actions{flex-wrap:wrap;gap:6px}
  .search-box{width:100%}
  .search-box:focus{width:100%}
  .filter-select{flex:1;min-width:0}
}
</style>
</head>
<body>
<header class="header" role="banner">
  <div class="header-logo"><span class="fire" aria-hidden="true">&#x1F525;</span> fireauto 지식 DB</div>
  <nav class="header-tabs" role="tablist" aria-label="뷰 전환">
    <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="projectView" id="tabProject" data-tab="project">프로젝트</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="timelineView" id="tabTimeline" data-tab="timeline">타임라인</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="graphView" id="tabGraph" data-tab="graph">그래프</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="searchView" id="tabSearch" data-tab="search">검색</button>
  </nav>
  <div class="header-actions">
    <input type="search" class="search-box" id="searchInput" placeholder="검색..." aria-label="메모리 검색">
    <select class="filter-select" id="projectFilter" aria-label="프로젝트 필터">
      <option value="">전체 프로젝트</option>
    </select>
    <button class="icon-btn" id="themeToggle" aria-label="테마 전환" title="테마 전환"></button>
  </div>
</header>
<div class="stats-bar" role="status" aria-live="polite">
  <span class="stat">메모리 <strong id="statMemories">0</strong>개</span>
  <span class="stat">관계 <strong id="statRelations">0</strong>개</span>
  <span class="stat"><span class="connection-dot disconnected" id="connDot"></span> <span id="connLabel">연결 중...</span></span>
</div>
<main class="main">
  <!-- Project View -->
  <section class="tab-content active" id="projectView" role="tabpanel" aria-labelledby="tabProject">
    <div class="empty-project" id="emptyProject">
      <div class="ep-icon">&#x1F4CB;</div>
      <div class="ep-title">프로젝트가 없어요</div>
      <div class="ep-desc">/project 또는 /planner로 프로젝트를 시작하세요</div>
    </div>
    <div class="project-dashboard" id="projectDashboard" style="display:none"></div>
  </section>
  <!-- Timeline View -->
  <section class="tab-content" id="timelineView" role="tabpanel" aria-labelledby="tabTimeline">
    <div id="feed" class="feed" role="feed" aria-label="지식 피드"></div>
    <div class="load-more" id="loadMoreWrap" style="display:none">
      <button class="load-more-btn" id="loadMoreBtn">더 보기</button>
    </div>
  </section>
  <!-- Graph View -->
  <section class="tab-content" id="graphView" role="tabpanel" aria-labelledby="tabGraph">
    <button id="graphFullscreen" class="fullscreen-btn" title="전체 화면">&#x26F6;</button>
    <canvas id="graph-canvas" aria-label="지식 관계 그래프"></canvas>
    <div class="graph-tooltip" id="graphTooltip">
      <div class="gt-title"></div>
      <div class="gt-type"></div>
    </div>
    <div class="graph-legend" id="graphLegend"></div>
  </section>
  <!-- Search View -->
  <section class="tab-content" id="searchView" role="tabpanel" aria-labelledby="tabSearch">
    <div id="searchFeed" class="feed" role="feed" aria-label="검색 결과"></div>
  </section>
</main>
<script>
(function(){
'use strict';
var API = '';
var TYPE_CONFIG = {
decision: { label: 'DECISION', ko: '결정', color: '#8b5cf6', bg: 'rgba(139,92,246,0.15)' },
bugfix:   { label: 'BUGFIX', ko: '버그수정', color: '#ef4444', bg: 'rgba(239,68,68,0.15)' },
feature:  { label: 'FEATURE', ko: '기능', color: '#22c55e', bg: 'rgba(34,197,94,0.15)' },
pattern:  { label: 'PATTERN', ko: '패턴', color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' },
gotcha:   { label: 'GOTCHA', ko: '주의', color: '#f97316', bg: 'rgba(249,115,22,0.15)' },
refactor: { label: 'REFACTOR', ko: '리팩토링', color: '#3b82f6', bg: 'rgba(59,130,246,0.15)' },
};
var RELATION_CONFIG = {
related:   { label: '관련', color: '#8b5cf6', dash: [] },
caused_by: { label: '원인', color: '#ef4444', dash: [6, 3] },
led_to:    { label: '결과', color: '#22c55e', dash: [4, 4] },
same_file: { label: '같은 파일', color: '#f59e0b', dash: [2, 2] },
same_tag:  { label: '같은 태그', color: '#3b82f6', dash: [8, 4] },
};
var state = {
memories: [],
summaries: [],
projects: [],
currentProject: '',
searchQuery: '',
isConnected: false,
stats: { total_memories: 0, total_relations: 0 },
loading: false,
activeTab: 'project',
graphData: null,
};
var $feed = document.getElementById('feed');
var $searchFeed = document.getElementById('searchFeed');
var $searchInput = document.getElementById('searchInput');
var $projectFilter = document.getElementById('projectFilter');
var $themeToggle = document.getElementById('themeToggle');
var $statMemories = document.getElementById('statMemories');
var $statRelations = document.getElementById('statRelations');
var $connDot = document.getElementById('connDot');
var $connLabel = document.getElementById('connLabel');
var $loadMoreWrap = document.getElementById('loadMoreWrap');
var $loadMoreBtn = document.getElementById('loadMoreBtn');
var $canvas = document.getElementById('graph-canvas');
var $tooltip = document.getElementById('graphTooltip');
var $legend = document.getElementById('graphLegend');
var $emptyProject = document.getElementById('emptyProject');
var $projectDashboard = document.getElementById('projectDashboard');
var tabBtns = document.querySelectorAll('.tab-btn');
var tabContents = document.querySelectorAll('.tab-content');
function el(tag, cls, txt) {
var e = document.createElement(tag);
if (cls) e.className = cls;
if (txt !== undefined) e.textContent = txt;
return e;
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function formatDate(ep) {
if (!ep) return '';
var d = new Date(ep);
return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}
function formatDateTime(ep) {
if (!ep) return '';
var d = new Date(ep);
return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function parseJson(v, fb) {
if (Array.isArray(v)) return v;
if (typeof v === 'string') { try { return JSON.parse(v); } catch (e) {} }
return fb || [];
}
function clearEl(p) { while (p.firstChild) p.removeChild(p.firstChild); }
function cleanTitle(title) {
if (!title) return '제목 없음';
var cleaned = title.replace(/^Tool:\s*\w+\s*Input:\s*/i, '');
cleaned = cleaned.replace(/^(Edit|Bash|Write|Read|Glob|Grep):\s*/i, '');
if (cleaned.startsWith('{')) {
try {
var j = JSON.parse(cleaned);
if (j.file_path) return j.file_path.split('/').pop();
if (j.command) return j.command.slice(0, 80);
} catch(e) {}
return cleaned.slice(0, 80);
}
return cleaned.slice(0, 120);
}
function highlightText(text, query) {
if (!query || !text) return document.createTextNode(text || '');
var frag = document.createDocumentFragment();
var lower = text.toLowerCase();
var qLower = query.toLowerCase();
var idx = 0;

var textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();
var fontFamily = getComputedStyle(document.body).fontFamily;
graphState.nodes.forEach(function(n) {
var tc = TYPE_CONFIG[n.type] || { color: '#6b7280', bg: 'rgba(107,114,128,0.15)' };
var r = graphState.hovered && graphState.hovered.id === n.id ? 18 : 14;
if (graphState.hovered && graphState.hovered.id === n.id) {
ctx.beginPath();
ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
ctx.fillStyle = tc.color + '20';
ctx.fill();
}
ctx.beginPath();
ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
ctx.fillStyle = tc.bg || (tc.color + '30');
ctx.fill();
ctx.strokeStyle = tc.color;
ctx.lineWidth = 2;
ctx.stroke();
var label = cleanTitle(n.title) || '';
if (label.length > 14) label = label.substring(0, 14) + '...';
ctx.fillStyle = textColor;
ctx.font = '11px ' + fontFamily;
ctx.textAlign = 'center';
ctx.fillText(label, n.x, n.y + r + 14);
});
ctx.restore();
}
function getNodeAt(mx, my) {
var x = (mx - graphState.panX) / graphState.scale;
var y = (my - graphState.panY) / graphState.scale;
for (var i = graphState.nodes.length - 1; i >= 0; i--) {
var n = graphState.nodes[i];
var dx = n.x - x; var dy = n.y - y;
if (dx * dx + dy * dy < 18 * 18) return n;
}
return null;
}
function renderLegend() {
clearEl($legend);
Object.keys(TYPE_CONFIG).forEach(function(t) {
var tc = TYPE_CONFIG[t];
var item = el('span', 'graph-legend-item');
var dot = el('span', 'graph-legend-dot');
dot.style.background = tc.color;
item.appendChild(dot);
item.appendChild(document.createTextNode(tc.label));
$legend.appendChild(item);
});
Object.keys(RELATION_CONFIG).forEach(function(r) {
var rc = RELATION_CONFIG[r];
var item = el('span', 'graph-legend-item');
var line = el('span', '');
line.style.cssText = 'width:16px;height:2px;background:' + rc.color + ';display:inline-block;vertical-align:middle;margin-right:2px;border-radius:1px';
item.appendChild(line);
item.appendChild(document.createTextNode(rc.label));
$legend.appendChild(item);
});
}
$canvas.addEventListener('mousedown', function(e) {
var rect = $canvas.getBoundingClientRect();
var mx = e.clientX - rect.left; var my = e.clientY - rect.top;
var node = getNodeAt(mx, my);
if (node) {
graphState.dragging = node;
graphState.dragOff = { x: (mx - graphState.panX) / graphState.scale - node.x, y: (my - graphState.panY) / graphState.scale - node.y };
} else {
graphState.isPanning = true;
graphState.panStartX = e.clientX - graphState.panX;
graphState.panStartY = e.clientY - graphState.panY;
}
});
$canvas.addEventListener('mousemove', function(e) {
var rect = $canvas.getBoundingClientRect();
var mx = e.clientX - rect.left; var my = e.clientY - rect.top;
if (graphState.dragging) {
graphState.dragging.x = (mx - graphState.panX) / graphState.scale - graphState.dragOff.x;
graphState.dragging.y = (my - graphState.panY) / graphState.scale - graphState.dragOff.y;
graphState.vx[graphState.dragging.id] = 0;
graphState.vy[graphState.dragging.id] = 0;
drawGraph();
} else if (graphState.isPanning) {
graphState.panX = e.clientX - graphState.panStartX;
graphState.panY = e.clientY - graphState.panStartY;
drawGraph();
} else {
var node = getNodeAt(mx, my);
if (node !== graphState.hovered) {
graphState.hovered = node;
drawGraph();
if (node) {
$tooltip.style.display = 'block';
$tooltip.style.left = (mx + 12) + 'px';
$tooltip.style.top = (my - 8) + 'px';
$tooltip.querySelector('.gt-title').textContent = cleanTitle(node.title) || '#' + node.id;
var tc = TYPE_CONFIG[node.type] || { label: node.type || '', ko: '' };
$tooltip.querySelector('.gt-type').textContent = tc.label + (tc.ko ? ' (' + tc.ko + ')' : '');
} else {
$tooltip.style.display = 'none';
}
} else if (node) {
$tooltip.style.left = (mx + 12) + 'px';
$tooltip.style.top = (my - 8) + 'px';
}
}
});
$canvas.addEventListener('mouseup', function() {
graphState.dragging = null;
graphState.isPanning = false;
});
$canvas.addEventListener('mouseleave', function() {
graphState.dragging = null;
graphState.isPanning = false;
graphState.hovered = null;
$tooltip.style.display = 'none';
drawGraph();
});
$canvas.addEventListener('wheel', function(e) {
e.preventDefault();
var delta = e.deltaY > 0 ? 0.9 : 1.1;
graphState.scale = Math.max(0.3, Math.min(3, graphState.scale * delta));
drawGraph();
}, { passive: false });
$canvas.addEventListener('touchstart', function(e) {
if (e.touches.length === 1) {
var t = e.touches[0];
var rect = $canvas.getBoundingClientRect();
var mx = t.clientX - rect.left; var my = t.clientY - rect.top;
var node = getNodeAt(mx, my);
if (node) {
e.preventDefault();
graphState.dragging = node;
graphState.dragOff = { x: (mx - graphState.panX) / graphState.scale - node.x, y: (my - graphState.panY) / graphState.scale - node.y };
} else {
graphState.isPanning = true;
graphState.panStartX = t.clientX - graphState.panX;
graphState.panStartY = t.clientY - graphState.panY;
}
}
}, { passive: false });
$canvas.addEventListener('touchmove', function(e) {
if (e.touches.length === 1) {
e.preventDefault();
var t = e.touches[0];
var rect = $canvas.getBoundingClientRect();
var mx = t.clientX - rect.left; var my = t.clientY - rect.top;
if (graphState.dragging) {
graphState.dragging.x = (mx - graphState.panX) / graphState.scale - graphState.dragOff.x;
graphState.dragging.y = (my - graphState.panY) / graphState.scale - graphState.dragOff.y;
graphState.vx[graphState.dragging.id] = 0;
graphState.vy[graphState.dragging.id] = 0;
drawGraph();
} else if (graphState.isPanning) {
graphState.panX = t.clientX - graphState.panStartX;
graphState.panY = t.clientY - graphState.panStartY;
drawGraph();
}
}
}, { passive: false });
$canvas.addEventListener('touchend', function() {
graphState.dragging = null; graphState.isPanning = false;
});
window.addEventListener('resize', function() {
if (state.activeTab === 'graph' && graphState.nodes.length) {
resizeCanvas(); drawGraph();
}
});
document.getElementById('graphFullscreen').onclick = function() {
var gv = document.getElementById('graphView');
gv.classList.toggle('fullscreen');
this.textContent = gv.classList.contains('fullscreen') ? '✕' : '⛶';
resizeCanvas();
if (graphState.nodes.length) initGraph(graphState.nodes, graphState.edges);
};
var searchTimer = null;
$searchInput.addEventListener('input', function(e) {
clearTimeout(searchTimer);
var val = e.target.value;
state.searchQuery = val;
searchTimer = setTimeout(function() { doSearch(val); }, 300);
});
$searchInput.addEventListener('keydown', function(e) {
if (e.key === 'Escape') {
this.value = '';
state.searchQuery = '';
if (state.activeTab === 'search') switchTab('timeline');
}
});
$projectFilter.addEventListener('change', function(e) {
state.currentProject = e.target.value;
loadMemories();
if (state.activeTab === 'graph') loadGraph();
});
$themeToggle.addEventListener('click', toggleTheme);
$loadMoreBtn.addEventListener('click', function() { loadMemories(); });
tabBtns.forEach(function(btn) {
btn.addEventListener('click', function() {
switchTab(btn.getAttribute('data-tab'));
});
});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function(e) {
if (!localStorage.getItem('fireauto-theme')) setTheme(e.matches ? 'dark' : 'light');
});
detectTheme();
showLoading();
connectSSE();
loadProject();
loadMemories();
loadStats();
})();
</script>
</body>
